<div style="padding: 20px; max-width: 800px; margin: auto;">
  <h2>Product Management</h2>

  <mat-card style="padding: 15px; margin-bottom: 20px;">
    <h3>{{ editingProductId ? 'Edit Product' : 'Add New Product' }}</h3>
    <div style="display: flex; gap: 15px; align-items: baseline;">
      <mat-form-field>
        <mat-label>Product Name</mat-label>
        <input matInput [(ngModel)]="newName" placeholder="e.g. Laptop">
      </mat-form-field>

      <mat-form-field>
        <mat-label>Price</mat-label>
        <input matInput type="number" [(ngModel)]="newPrice" placeholder="e.g. 1500">
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="saveProduct()" [disabled]="!newName || !newPrice">
        {{ editingProductId ? 'Update' : 'Add' }}
      </button>

      @if (editingProductId) {
        <button mat-button (click)="cancelEdit()">
          Cancel
        </button>
      }
    </div>
  </mat-card>

  <mat-form-field style="width: 100%;">
    <mat-label>Search & Filter Products</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Type a name or price...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8" style="width: 100%;">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let product"> {{product.name}} </td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
      <td mat-cell *matCellDef="let product"> ${{product.price}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let product">
        <button mat-icon-button color="primary" (click)="editProduct(product)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteProduct(product.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="3" style="padding: 15px; text-align: center;">
        No products match the filter.
      </td>
    </tr>
  </table>
</div>
