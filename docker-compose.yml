version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: my-postgres
    environment:
      POSTGRES_USER: test_oop
      POSTGRES_PASSWORD: test_oop
      POSTGRES_DB: test-person
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./demo_backend
    container_name: spring-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/test-person
      - SPRING_DATASOURCE_USERNAME=test_oop
      - SPRING_DATASOURCE_PASSWORD=test_oop

  frontend:
    build:
      context: ./demo-app
    container_name: angular-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend